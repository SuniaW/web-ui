version: '3.8'

services:
  # 前端服务
  web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: web-ui:latest
    container_name: web-ui-app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - ai-rag-service # 确保后端先启动
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai-network

  # 后端服务 (Spring Boot)
  ai-rag-service:
    build:
      context: ../spring-ai-rag # 指向同级的后端目录
      dockerfile: Dockerfile
    image: spring-ai-rag:latest
    container_name: ai-rag-backend
    restart: always
    # 注意：不需要写 ports 映射到宿主机，Nginx 内部能通过 8080 访问它，更安全
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai-network

# 创建一个内部网络，方便容器间通过服务名通信
networks:
  ai-network:
    driver: bridge